<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #8b949e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 14px;
      opacity: 0;
      animation: fadeIn 120ms ease-out forwards;
    }
    @keyframes fadeIn { to { opacity: 1; } }
    .logo { width: 44px; height: 44px; opacity: 0.8; }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(139, 148, 158, 0.15);
      border-top-color: #58a6ff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 16px; font-weight: 500; color: #c9d1d9; letter-spacing: 0.02em; }
  </style>
</head>
<body>
  <img class="logo" src="/static/logo.svg" alt="" onerror="this.style.display='none'">
  <div class="title">Lectura</div>
  <div class="spinner"></div>
</body>
</html>
