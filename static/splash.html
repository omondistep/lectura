<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #8b949e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .logo { width: 48px; height: 48px; opacity: 0.7; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(139, 148, 158, 0.2);
      border-top-color: #8b949e;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .title { font-size: 18px; font-weight: 500; color: #c9d1d9; }
  </style>
</head>
<body>
  <img class="logo" src="/static/logo.svg" alt="" onerror="this.style.display='none'">
  <div class="title">Lectura</div>
  <div class="spinner"></div>
</body>
</html>
